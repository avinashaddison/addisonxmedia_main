        {
          "@type": "Question",
          "name": "Does AddisonX support Hindi and other Indian languages?",

            "@type": "Answer",

          }
        },
        {
          "@type": "Question",
          "name": "Is AddisonX DPDP Act 2023 compliant and where is data hosted?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. AddisonX is fully DPDP Act 2023 compliant. All customer data is hosted on Indian servers in Mumbai with sub-100ms latency for users across India including Ranchi, Bengaluru and Delhi. Consent flows and audit logs are built in."
          }
        },
        {
          "@type": "Question",
          "name": "Can I collect UPI payments inside WhatsApp chat?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. AddisonX integrates with Razorpay, UPI, PhonePe, Paytm and Cashfree. Customers tap a payment link inside the chat and pay via UPI — the deal is auto-reconciled in your CRM and a GST invoice is generated automatically."
          }
        },
        {
          "@type": "Question",
          "name": "How much does AddisonX cost in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AddisonX starts at ₹499/month for solo founders and kirana stores. The Growth plan at ₹1,999/month includes Addison AI, unlimited team members, broadcasts, and 11 Indian language support. Enterprise plans with dedicated CSM start at custom pricing. All plans include GST invoice every month."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a free trial and do I need a credit card?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — 7-day free trial with no credit card required. Setup takes 5 minutes. Your WhatsApp Business account connects via the official Meta API and onboarding happens within 24 hours."
          }

          "@type": "Question",
          "name": "Can I migrate from WATI, Interakt or AiSensy?",

            "@type": "Answer",

        }
